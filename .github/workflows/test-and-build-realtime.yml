name: Realtime – Test, Build & Push

on:
  push:
    branches: [main]
    paths:
      - "realtime/**"
  pull_request:
    branches: ["**"]
    paths:
      - "realtime/**"

permissions:
  actions: read
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/realtime
  TEST_DURATION_REGRESSION_PCT: "20"
  REALTIME_WORKFLOW_FILE: test-and-build-realtime.yml

jobs:
  test:
    name: Go tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: realtime
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: realtime/go.sum
      - name: Run Go test suite (timed)
        id: go-tests
        run: |
          start_ts=$(date +%s)
          set +e
          go test -v -race ./...
          test_status=$?
          end_ts=$(date +%s)

          duration_seconds=$((end_ts - start_ts))
          duration_minutes=$((duration_seconds / 60))
          duration_remainder=$((duration_seconds % 60))

          echo "duration_seconds=${duration_seconds}" >> "$GITHUB_OUTPUT"
          echo "duration_human=${duration_minutes}m ${duration_remainder}s" >> "$GITHUB_OUTPUT"

          exit $test_status

      - name: Report test suite duration
        if: always()
        run: |
          duration_seconds="${{ steps.go-tests.outputs.duration_seconds }}"
          duration_human="${{ steps.go-tests.outputs.duration_human }}"

          echo "## Realtime test suite timing" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$duration_seconds" ]; then
            echo "- Full suite duration: **${duration_human}** (${duration_seconds}s)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Full suite duration: **not captured**" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "- Workflow run: [View run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> "$GITHUB_STEP_SUMMARY"

      - name: Compare test duration vs latest successful main
        if: always() && steps.go-tests.outputs.duration_seconds != ''
        id: compare-duration
        uses: actions/github-script@v8
        env:
          CURRENT_DURATION_SECONDS: ${{ steps.go-tests.outputs.duration_seconds }}
          THRESHOLD_PCT: ${{ env.TEST_DURATION_REGRESSION_PCT }}
          WORKFLOW_FILE: ${{ env.REALTIME_WORKFLOW_FILE }}
        with:
          script: |
            const current = Number(process.env.CURRENT_DURATION_SECONDS || "0");
            const threshold = Number(process.env.THRESHOLD_PCT || "20");
            const workflowFile = process.env.WORKFLOW_FILE;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            core.setOutput("comparison_available", "false");
            core.setOutput("baseline_seconds", "");
            core.setOutput("pct_change", "");
            core.setOutput("is_regression", "false");

            if (!current || Number.isNaN(current)) {
              core.warning("Current test duration is unavailable; skipping baseline comparison.");
              return;
            }

            const runsResp = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: workflowFile,
              branch: "main",
              status: "success",
              per_page: 30,
            });

            const candidateRuns = (runsResp.data.workflow_runs || []).filter(
              run => run.id !== context.runId
            );

            let baselineSeconds = null;
            let baselineRunId = null;

            for (const run of candidateRuns) {
              const jobsResp = await github.rest.actions.listJobsForWorkflowRun({
                owner,
                repo,
                run_id: run.id,
                per_page: 100,
              });

              for (const job of jobsResp.data.jobs || []) {
                const timedStep = (job.steps || []).find(
                  step =>
                    step.name === "Run Go test suite (timed)" &&
                    step.conclusion === "success" &&
                    step.started_at &&
                    step.completed_at
                );

                if (!timedStep) continue;

                const started = new Date(timedStep.started_at).getTime();
                const completed = new Date(timedStep.completed_at).getTime();
                const seconds = Math.max(0, Math.round((completed - started) / 1000));
                if (seconds > 0) {
                  baselineSeconds = seconds;
                  baselineRunId = run.id;
                  break;
                }
              }

              if (baselineSeconds !== null) break;
            }

            if (baselineSeconds === null) {
              core.warning("No baseline test timing found from successful main runs.");
              await core.summary
                .addHeading("Realtime test duration baseline")
                .addRaw("- Baseline comparison: **not available yet** (need one prior successful main run with timed step)\n")
                .write();
              return;
            }

            const pctChange = ((current - baselineSeconds) / baselineSeconds) * 100;
            const isRegression = pctChange > threshold;

            core.setOutput("comparison_available", "true");
            core.setOutput("baseline_seconds", String(baselineSeconds));
            core.setOutput("pct_change", pctChange.toFixed(1));
            core.setOutput("is_regression", String(isRegression));

            const sign = pctChange >= 0 ? "+" : "";
            const baselineLink = `https://github.com/${owner}/${repo}/actions/runs/${baselineRunId}`;

            await core.summary
              .addHeading("Realtime test duration comparison")
              .addRaw(`- Current: **${current}s**\n`)
              .addRaw(`- Baseline (latest successful main): **${baselineSeconds}s** ([run](${baselineLink}))\n`)
              .addRaw(`- Delta: **${sign}${pctChange.toFixed(1)}%** (threshold: ${threshold}%)\n`)
              .write();

            if (isRegression) {
              core.warning(
                `Realtime test suite duration regressed by ${pctChange.toFixed(1)}% (current=${current}s, baseline=${baselineSeconds}s, threshold=${threshold}%).`
              );
            }

  build-and-push:
    name: Build & push container
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./realtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
