name: Realtime – Test, Build & Push

on:
  push:
    branches: [main]
    paths:
      - "realtime/**"
  pull_request:
    branches: ["**"]
    paths:
      - "realtime/**"

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/realtime

jobs:
  test:
    name: Go tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: realtime
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: realtime/go.sum
      - name: Run Go test suite (timed)
        id: go-tests
        run: |
          start_ts=$(date +%s)
          set +e
          go test -v -race ./...
          test_status=$?
          end_ts=$(date +%s)

          duration_seconds=$((end_ts - start_ts))
          duration_minutes=$((duration_seconds / 60))
          duration_remainder=$((duration_seconds % 60))

          echo "duration_seconds=${duration_seconds}" >> "$GITHUB_OUTPUT"
          echo "duration_human=${duration_minutes}m ${duration_remainder}s" >> "$GITHUB_OUTPUT"

          exit $test_status

      - name: Report test suite duration
        if: always()
        run: |
          duration_seconds="${{ steps.go-tests.outputs.duration_seconds }}"
          duration_human="${{ steps.go-tests.outputs.duration_human }}"

          echo "## Realtime test suite timing" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$duration_seconds" ]; then
            echo "- Full suite duration: **${duration_human}** (${duration_seconds}s)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Full suite duration: **not captured**" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "- Workflow run: [View run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> "$GITHUB_STEP_SUMMARY"

  build-and-push:
    name: Build & push container
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./realtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
