name: Next.js Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  unit-and-streaming:
    name: Unit & streaming tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npx vitest run --exclude '**/llm-integration*'

  llm-integration:
    name: LLM integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npx vitest run __tests__/llm-integration.test.ts __tests__/agent-2/llm-integration.test.ts
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
