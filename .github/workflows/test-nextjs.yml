name: Next.js Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  agent-and-realtime:
    name: Agent-2, operation-history, realtime & element tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      # Agent 0 and Agent 1 test suites are deprecated and intentionally
      # excluded. This run covers Agent 2, operation-history, the realtime
      # client + authorize tests, and the element adapter/helper unit tests.
      # LLM integration runs in its own job below so it can receive API
      # credentials.
      - run: |
          npx vitest run \
            __tests__/agent-2 \
            __tests__/operation-history \
            __tests__/realtime-authorize.test.ts \
            __tests__/realtime-client.test.ts \
            __tests__/element-adapters.test.ts \
            __tests__/element-helpers.test.ts \
            --exclude '**/llm-integration*'

  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  llm-integration:
    name: LLM integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npx vitest run __tests__/agent-2/llm-integration.test.ts
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
